apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-hockeybot
  labels:
    {{- include "hockeybot.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "hockeybot.selectorLabels" . | nindent 4 }}
